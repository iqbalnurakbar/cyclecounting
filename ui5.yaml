specVersion: "3.1"
metadata:
  name: cyclecounting
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - path: /sap
            url: http://10.6.168.44:8000
            client: '300'
            authenticationType: basic
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-servestatic
      afterMiddleware: compression
      configuration:
        paths:
          - path: /resources/cyclecountingimoverplus
            src: ..\cyclecountingimoverplus\webapp
          - path: /appconfig
            src: appconfig
          - path: /resources/cockpit
            src: ..\cockpit\webapp
